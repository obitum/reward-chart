<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Reward Chart</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon_32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/icon_16x16.png">
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1><img src="assets/icons/icon_32x32.png" class="title-icon" alt=""> MINECRAFT REWARD CHART <img src="assets/icons/icon_32x32.png" class="title-icon" alt=""></h1>

      <div class="total-display">Blocks Mined: <span id="totalMined">0</span> / 101</div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%">
          <span id="progressText">0%</span>
        </div>
      </div>

      <div class="chart-grid" id="chartGrid"></div>

      <button class="reset-btn" id="resetBtn">&nbsp;</button>
    </div>

    <script>
      const totalBlocks = 101;

      // Layered textures like Minecraft world (top to bottom)
      // Row 1 (1-10): Grass, Rows 2-3 (11-30): Dirt, Rows 4-7 (31-70): Cobblestone, Rows 8-11 (71-101): Deepslate
      function getLayerTexture(blockNum) {
        const row = Math.ceil(blockNum / 10);
        if (row <= 1) return "assets/textures/blocks/grass_block_side.png";
        if (row <= 3) return "assets/textures/blocks/coarse_dirt.png";
        if (row <= 7) return "assets/textures/blocks/cobblestone.png";
        return "assets/textures/blocks/deepslate.png";
      }

      const milestoneTextures = {
        31: "assets/textures/blocks/coal_ore.png",
        51: "assets/textures/blocks/iron_ore.png",
        71: "assets/textures/blocks/deepslate_emerald_ore.png",
        81: "assets/textures/blocks/deepslate_gold_ore.png",
        91: "assets/textures/blocks/deepslate_redstone_ore.png",
        101: "assets/textures/blocks/deepslate_diamond_ore.png",
      };

      function getBlockTexture(blockNum) {
        return milestoneTextures[blockNum] || getLayerTexture(blockNum);
      }

      function initChart() {
        const grid = document.getElementById("chartGrid");
        grid.innerHTML = "";

        const saved = JSON.parse(localStorage.getItem("minecraftRewards") || "[]");

        for (let i = 1; i <= totalBlocks; i++) {
          const block = document.createElement("div");
          block.className = "block";
          block.style.backgroundImage = `url('${getBlockTexture(i)}')`;
          if (saved.includes(i)) {
            block.classList.add("completed");
          }

          const blockNum = document.createElement("div");
          blockNum.className = "block-number";
          blockNum.textContent = `#${i}`;
          block.appendChild(blockNum);

          block.onclick = () => toggleBlock(i);
          grid.appendChild(block);
        }

        updateProgress();
      }

      function toggleBlock(blockNum) {
        if (animating) return;
        new Audio(`assets/sounds/dig/stone${Math.floor(Math.random() * 4) + 1}.ogg`).play();
        const saved = JSON.parse(localStorage.getItem("minecraftRewards") || "[]");
        const index = saved.indexOf(blockNum);

        if (index > -1) {
          saved.splice(index, 1);
        } else {
          saved.push(blockNum);
        }

        localStorage.setItem("minecraftRewards", JSON.stringify(saved));

        const block = document.querySelectorAll(".block")[blockNum - 1];
        block.classList.toggle("completed");
        updateProgress();
      }

      function updateProgress() {
        const saved = JSON.parse(localStorage.getItem("minecraftRewards") || "[]");
        const percentage = ((saved.length / totalBlocks) * 100).toFixed(1);

        document.getElementById("totalMined").textContent = saved.length;
        document.getElementById("progressBar").style.width = percentage + "%";
        document.getElementById("progressText").textContent = percentage + "%";
      }

      let animating = false;

      function triggerTNT() {
        if (animating) return;
        animating = true;

        const blocks = document.querySelectorAll(".block");
        const indices = Array.from({ length: blocks.length }, (_, i) => i);

        // Shuffle and pick 8-12 random positions from all blocks
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const count = 6 + Math.floor(Math.random() * 4);
        const tntIndices = indices.slice(0, count);

        // Step 1: Place TNT blocks (remove completed state first)
        tntIndices.forEach((i) => {
          blocks[i].classList.remove("completed");
          blocks[i].classList.add("tnt");
        });

        // Play fuse sound during flash phase
        const fuseSound = new Audio("assets/sounds/explosion/fuse.ogg");
        fuseSound.play();

        // Step 2: Flash 3 times (250ms on, 250ms off per cycle = 1.5s total)
        let flashes = 0;
        const flashInterval = setInterval(() => {
          tntIndices.forEach((i) => blocks[i].classList.toggle("flash"));
          flashes++;
          if (flashes >= 6) {
            clearInterval(flashInterval);

            // Step 3: Single big explosion over the whole grid
            fuseSound.pause();
            new Audio(`assets/sounds/explosion/explode${Math.floor(Math.random() * 4) + 1}.ogg`).play();
            tntIndices.forEach((i) => blocks[i].classList.remove("tnt", "flash"));

            const grid = document.getElementById("chartGrid");
            const explosionFrames = 16;
            const frameDuration = 60;

            // Spawn multiple explosion layers at randomised sizes and positions
            const layerCount = 4 + Math.floor(Math.random() * 3);
            const layers = Array.from({ length: layerCount }, (_, i) => ({
              size: 50 + Math.floor(Math.random() * 80),
              x: -30 + Math.floor(Math.random() * 60),
              y: -30 + Math.floor(Math.random() * 60),
              delay: Math.floor(Math.random() * 5),
            }));

            const sprites = layers.map((l) => {
              const s = document.createElement("div");
              s.className = "grid-explosion";
              s.style.inset = "0";
              s.style.width = l.size + "%";
              s.style.height = l.size + "%";
              s.style.left = l.x + "%";
              s.style.top = l.y + "%";
              grid.appendChild(s);
              return { el: s, delay: l.delay, frame: -l.delay };
            });

            let tick = 0;
            const maxTicks = explosionFrames + Math.max(...layers.map((l) => l.delay));
            const spriteInterval = setInterval(() => {
              if (tick >= maxTicks) {
                clearInterval(spriteInterval);
                sprites.forEach((s) => s.el.remove());

                // Step 4: White out all blocks then reset
                blocks.forEach((b) => b.classList.add("completed"));
                setTimeout(() => {
                  localStorage.removeItem("minecraftRewards");
                  animating = false;
                  initChart();
                }, 600);
                return;
              }
              sprites.forEach((s) => {
                const f = tick - s.delay;
                if (f >= 0 && f < explosionFrames) {
                  s.el.style.backgroundImage = `url('assets/sprites/explosion/explosion_${f}.png')`;
                } else if (f >= explosionFrames) {
                  s.el.style.backgroundImage = "none";
                }
              });
              tick++;
            }, frameDuration);
          }
        }, 250);
      }

      document.getElementById("resetBtn").addEventListener("click", triggerTNT);

      initChart();
    </script>
  </body>
</html>
