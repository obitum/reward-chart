<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Reward Chart</title>
    <style>
      body {
        font-family: "Arial Black", Arial, sans-serif;
        background: linear-gradient(to bottom, #87ceeb 0%, #98d8c8 50%, #7cb342 100%);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        cursor:
          url("assets/diamond_pickaxe_32.png") 0 0,
          auto;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        max-width: 900px;
      }

      h1 {
        text-align: center;
        color: #2e7d32;
        font-size: 2.5em;
        margin: 0 0 10px 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .chart-grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 8px;
        margin: 20px 0;
      }

      .block {
        aspect-ratio: 1;
        border: 3px solid #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor:
          url("assets/diamond_pickaxe_32.png") 0 0,
          pointer;
        transition: transform 0.2s;
        color: white;
        font-size: 0.7em;
        position: relative;
        background-size: cover;
        background-position: center;
        image-rendering: pixelated;
        text-shadow:
          1px 1px 2px rgba(0, 0, 0, 0.8),
          -1px -1px 2px rgba(0, 0, 0, 0.5);
      }

      .block:hover {
        transform: scale(1.1);
        z-index: 1;
      }

      .block.completed {
        background: white !important;
        background-image: none !important;
        border-color: transparent !important;
      }

      .block.completed > div {
        visibility: hidden;
      }

      .block.tnt {
        background-image: url("assets/tnt_side.png") !important;
      }

      .block.tnt.flash {
        background: white !important;
        background-image: none !important;
      }

      .grid-explosion {
        position: absolute;
        inset: -20%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        image-rendering: pixelated;
        pointer-events: none;
        z-index: 10;
      }

      .chart-grid {
        position: relative;
      }

      .block-number {
        font-size: 0.9em;
        margin-top: 2px;
      }

      .progress-bar {
        width: 100%;
        height: 30px;
        background: #e0e0e0;
        border-radius: 15px;
        overflow: hidden;
        margin: 20px 0;
        border: 3px solid #333;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4caf50 0%, #8bc34a 100%);
        transition: width 0.3s;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 10px;
        color: white;
        font-weight: bold;
      }

      .total-display {
        text-align: center;
        font-size: 2em;
        color: #2e7d32;
        margin: 10px 0;
      }

      .reset-btn {
        display: block;
        margin: 20px auto;
        padding: 10px 30px;
        background-color: #c44;
        background-image: url("assets/tnt_side.png");
        background-size: 64px 64px;
        background-repeat: repeat-x;
        background-position: center;
        height: 64px;
        image-rendering: pixelated;
        color: white;
        border: 3px solid #333;
        border-radius: 5px;
        font-size: 1em;
        font-weight: bold;
        cursor:
          url("assets/diamond_pickaxe_32.png") 0 0,
          pointer;
        font-family: "Arial Black", Arial, sans-serif;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
      }

      .reset-btn:hover {
        transform: scale(1.05);
      }

      .reset-btn:active {
        transform: scale(0.95);
      }

      @media print {
        body {
          background: white;
        }
        .reset-btn {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎮 MINECRAFT REWARD CHART 🎮</h1>

      <div class="total-display">Blocks Mined: <span id="totalMined">0</span> / 101</div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%">
          <span id="progressText">0%</span>
        </div>
      </div>

      <div class="chart-grid" id="chartGrid"></div>

      <button class="reset-btn" id="resetBtn">&nbsp;</button>
    </div>

    <script>
      const totalBlocks = 101;

      // Layered textures like Minecraft world (top to bottom)
      // Row 1 (1-10): Grass, Rows 2-3 (11-30): Dirt, Rows 4-7 (31-70): Cobblestone, Rows 8-11 (71-101): Deepslate
      function getLayerTexture(blockNum) {
        const row = Math.ceil(blockNum / 10);
        if (row <= 1) return "assets/grass_block_side.png";
        if (row <= 3) return "assets/coarse_dirt.png";
        if (row <= 7) return "assets/cobblestone.png";
        return "assets/deepslate.png";
      }

      const milestoneTextures = {
        31: "assets/coal_ore.png",
        51: "assets/iron_ore.png",
        71: "assets/deepslate_emerald_ore.png",
        81: "assets/deepslate_gold_ore.png",
        91: "assets/deepslate_redstone_ore.png",
        101: "assets/deepslate_diamond_ore.png",
      };

      function getBlockTexture(blockNum) {
        return milestoneTextures[blockNum] || getLayerTexture(blockNum);
      }

      function initChart() {
        const grid = document.getElementById("chartGrid");
        grid.innerHTML = "";

        const saved = JSON.parse(localStorage.getItem("minecraftRewards") || "[]");

        for (let i = 1; i <= totalBlocks; i++) {
          const block = document.createElement("div");
          block.className = "block";
          block.style.backgroundImage = `url('${getBlockTexture(i)}')`;
          if (saved.includes(i)) {
            block.classList.add("completed");
          }

          const blockNum = document.createElement("div");
          blockNum.className = "block-number";
          blockNum.textContent = `#${i}`;
          block.appendChild(blockNum);

          block.onclick = () => toggleBlock(i);
          grid.appendChild(block);
        }

        updateProgress();
      }

      function toggleBlock(blockNum) {
        if (animating) return;
        const saved = JSON.parse(localStorage.getItem("minecraftRewards") || "[]");
        const index = saved.indexOf(blockNum);

        if (index > -1) {
          saved.splice(index, 1);
        } else {
          saved.push(blockNum);
        }

        localStorage.setItem("minecraftRewards", JSON.stringify(saved));
        initChart();
      }

      function updateProgress() {
        const saved = JSON.parse(localStorage.getItem("minecraftRewards") || "[]");
        const percentage = ((saved.length / totalBlocks) * 100).toFixed(1);

        document.getElementById("totalMined").textContent = saved.length;
        document.getElementById("progressBar").style.width = percentage + "%";
        document.getElementById("progressText").textContent = percentage + "%";
      }

      let animating = false;

      function triggerTNT() {
        if (animating) return;
        animating = true;

        const blocks = document.querySelectorAll(".block");
        const indices = Array.from({ length: blocks.length }, (_, i) => i);

        // Shuffle and pick 8-12 random positions from all blocks
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const count = 6 + Math.floor(Math.random() * 4);
        const tntIndices = indices.slice(0, count);

        // Step 1: Place TNT blocks (remove completed state first)
        tntIndices.forEach((i) => {
          blocks[i].classList.remove("completed");
          blocks[i].classList.add("tnt");
        });

        // Step 2: Flash 3 times (250ms on, 250ms off per cycle = 1.5s total)
        let flashes = 0;
        const flashInterval = setInterval(() => {
          tntIndices.forEach((i) => blocks[i].classList.toggle("flash"));
          flashes++;
          if (flashes >= 6) {
            clearInterval(flashInterval);

            // Step 3: Single big explosion over the whole grid
            new Audio(`assets/explode${Math.floor(Math.random() * 4) + 1}.ogg`).play();
            tntIndices.forEach((i) => blocks[i].classList.remove("tnt", "flash"));

            const grid = document.getElementById("chartGrid");
            const sprite = document.createElement("div");
            sprite.className = "grid-explosion";
            grid.appendChild(sprite);

            const explosionFrames = 16;
            const frameDuration = 60;
            let frame = 0;
            const spriteInterval = setInterval(() => {
              if (frame >= explosionFrames) {
                clearInterval(spriteInterval);
                sprite.remove();

                // Step 4: White out all blocks then reset
                blocks.forEach((b) => b.classList.add("completed"));
                setTimeout(() => {
                  localStorage.removeItem("minecraftRewards");
                  animating = false;
                  initChart();
                }, 600);
                return;
              }
              sprite.style.backgroundImage = `url('assets/explosion_${frame}.png')`;
              frame++;
            }, frameDuration);
          }
        }, 250);
      }

      document.getElementById("resetBtn").addEventListener("click", triggerTNT);

      initChart();
    </script>
  </body>
</html>
